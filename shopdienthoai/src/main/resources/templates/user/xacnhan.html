<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận tài khoản - Shopdienthoai</title>
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/user.js"></script>
    <script src="js/main.js"></script>
</head>
<body class="auth-body">

<div class="auth-page auth-page-centered">
    <div class="auth-form-wrap">

        <!-- Logo -->
        <a href="index" class="auth-centered-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="5" y="2" width="14" height="20" rx="3" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="17" r="1.5" fill="currentColor"/>
            </svg>
            shop<strong>dienthoai</strong>
        </a>

        <!-- Card -->
        <div class="auth-card auth-card-sm">

            <!-- Icon -->
            <div class="auth-icon-block">
                <div class="auth-icon-circle auth-icon-circle-green">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>

            <div class="auth-card-header" style="text-align:center;">
                <h1 class="auth-title">Xác nhận tài khoản</h1>
                <p class="auth-subtitle">Mã xác nhận đã được gửi vào email của bạn. Vui lòng kiểm tra và nhập mã bên dưới.</p>
            </div>

            <form action="javascript:confirmAccount()" autocomplete="off" class="auth-form">
                <div class="auth-field">
                    <label class="auth-label">Mã xác nhận</label>
                    <div class="auth-input-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M15 7h3a2 2 0 012 2v6a2 2 0 01-2 2h-3m-6 0H6a2 2 0 01-2-2V9a2 2 0 012-2h3m6 4H9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input id="maxacthuc" class="auth-input otp-input" placeholder="Nhập mã xác nhận" maxlength="10" autocomplete="one-time-code">
                    </div>
                </div>

                <!-- Hint -->
                <div class="auth-tips">
                    <span class="auth-tip">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="#3b82f6" stroke-width="2"/>
                            <path d="M12 8v4m0 4h.01" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Kiểm tra hộp thư đến hoặc thư mục spam
                    </span>
                    <span class="auth-tip">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="#3b82f6" stroke-width="2"/>
                            <path d="M12 8v4m0 4h.01" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Mã có hiệu lực trong vòng 10 phút
                    </span>
                </div>

                <button type="submit" class="btn-auth-primary btn-auth-green">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Xác nhận
                </button>
            </form>

            <div class="auth-divider"><span>hoặc</span></div>

            <div class="auth-alt">
                Đã có tài khoản?
                <a href="login" class="auth-alt-link">Đăng nhập</a>
            </div>

            <a href="index" class="auth-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Quay lại trang chủ
            </a>

        </div>
    </div>
</div>

</body>
</html>
