<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Shopdienthoai</title>
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/user.js"></script>
    <script src="js/main.js"></script>
</head>
<body class="auth-body">

<div class="auth-page auth-page-centered">
    <div class="auth-form-wrap">

        <!-- Logo -->
        <a href="index" class="auth-centered-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="5" y="2" width="14" height="20" rx="3" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="17" r="1.5" fill="currentColor"/>
            </svg>
            shop<strong>dienthoai</strong>
        </a>

        <!-- Card -->
        <div class="auth-card auth-card-sm">

            <div class="auth-icon-block">
                <div class="auth-icon-circle">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm16 2l-8 5-8-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>

            <div class="auth-card-header" style="text-align:center;">
                <h1 class="auth-title">Quên mật khẩu?</h1>
                <p class="auth-subtitle">Nhập email đã đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu cho bạn.</p>
            </div>

            <form action="javascript:forgorPassword()" autocomplete="off" class="auth-form">
                <div class="auth-field">
                    <label class="auth-label">Địa chỉ Email</label>
                    <div class="auth-input-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm16 2l-8 5-8-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input required type="email" id="email" class="auth-input" placeholder="example@email.com">
                    </div>
                </div>

                <button type="submit" class="btn-auth-primary">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Gửi email đặt lại mật khẩu
                </button>
            </form>

            <div class="auth-divider"><span>hoặc</span></div>

            <div class="auth-alt">
                Nhớ mật khẩu rồi?
                <a href="login" class="auth-alt-link">Đăng nhập</a>
            </div>

            <a href="index" class="auth-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Quay lại trang chủ
            </a>
        </div>

    </div>
</div>

</body>
</html>
