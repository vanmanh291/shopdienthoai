<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Shopdienthoai</title>
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/user.js"></script>
    <script src="js/main.js"></script>
</head>
<body class="auth-body">

<div class="auth-page">

    <!-- Bên trái: branding -->
    <div class="auth-brand">
        <a href="index" class="auth-brand-logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                <rect x="5" y="2" width="14" height="20" rx="3" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="17" r="1.5" fill="currentColor"/>
            </svg>
            shop<strong>dienthoai</strong>
        </a>
        <div class="auth-brand-content">
            <h2>Chào mừng trở lại!</h2>
            <p>Đăng nhập để xem đơn hàng, theo dõi vận chuyển và nhận ưu đãi độc quyền.</p>
            <div class="auth-brand-perks">
                <div class="auth-perk">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    Hàng chính hãng 100%
                </div>
                <div class="auth-perk">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    Giao hàng toàn quốc
                </div>
                <div class="auth-perk">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm0 0l8 8 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    Bảo hành & hỗ trợ 24/7
                </div>
            </div>
        </div>
    </div>

    <!-- Bên phải: form -->
    <div class="auth-form-wrap">
        <div class="auth-card">
            <div class="auth-card-header">
                <h1 class="auth-title">Đăng nhập</h1>
                <p class="auth-subtitle">Nhập tài khoản và mật khẩu để tiếp tục</p>
            </div>

            <form action="javascript:login()" autocomplete="off" class="auth-form">
                <div class="auth-field">
                    <label class="auth-label">Email</label>
                    <div class="auth-input-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
                            <path d="M4 20c0-3.314 3.134-6 7-6h2c3.866 0 7 2.686 7 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input required name="username" id="username" class="auth-input" placeholder="Nhập tên tài khoản hoặc email">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-label">Mật khẩu</label>
                    <div class="auth-input-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input required name="password" type="password" id="password" class="auth-input" placeholder="Nhập mật khẩu">
                    </div>
                    <a href="quenmatkhau" class="auth-forgot">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-auth-primary">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Đăng nhập
                </button>
            </form>

            <div class="auth-divider"><span>hoặc</span></div>

            <div class="auth-alt">
                Chưa có tài khoản?
                <a href="dangky" class="auth-alt-link">Đăng ký ngay</a>
            </div>

            <a href="index" class="auth-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Quay lại trang chủ
            </a>
        </div>
    </div>

</div>

</body>
</html>
