<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Shopdienthoai</title>
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/user.js"></script>
    <script src="js/main.js"></script>
</head>

<body class="auth-body">

    <div class="auth-page">

        <!-- Bên trái: branding -->
        <div class="auth-brand">
            <a href="index" class="auth-brand-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                    <rect x="5" y="2" width="14" height="20" rx="3" stroke="currentColor" stroke-width="2" />
                    <circle cx="12" cy="17" r="1.5" fill="currentColor" />
                </svg>
                shop<strong>dienthoai</strong>
            </a>
            <div class="auth-brand-content">
                <h2>Tạo tài khoản mới</h2>
                <p>Đăng ký để mua sắm dễ dàng, theo dõi đơn hàng và nhận thông báo khuyến mãi.</p>
                <div class="auth-brand-perks">
                    <div class="auth-perk">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Nhận ưu đãi thành viên
                    </div>
                    <div class="auth-perk">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Theo dõi đơn hàng dễ dàng
                    </div>
                    <div class="auth-perk">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Thông báo khuyến mãi sớm nhất
                    </div>
                </div>
            </div>
        </div>

        <!-- Bên phải: form -->
        <div class="auth-form-wrap">
            <div class="auth-card">
                <div class="auth-card-header">
                    <h1 class="auth-title">Đăng ký</h1>
                    <p class="auth-subtitle">Điền thông tin bên dưới để tạo tài khoản</p>
                </div>

                <form action="javascript:regis()" autocomplete="off" class="auth-form">
                    <div class="auth-field">
                        <label class="auth-label">Họ và tên</label>
                        <div class="auth-input-wrap">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" />
                                <path d="M4 20c0-3.314 3.134-6 7-6h2c3.866 0 7 2.686 7 6" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" />
                            </svg>
                            <input id="fullname" class="auth-input" placeholder="Nhập họ và tên đầy đủ">
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label">Email</label>
                        <div class="auth-input-wrap">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm16 2l-8 5-8-5"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            </svg>
                            <input type="email" id="email" class="auth-input" placeholder="Nhập địa chỉ email">
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label">Số điện thoại</label>
                        <div class="auth-input-wrap">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            </svg>
                            <input type="tel" id="phone" class="auth-input" placeholder="Nhập số điện thoại">
                        </div>
                    </div>


                    <div class="auth-field">
                        <label class="auth-label">Mật khẩu</label>
                        <div class="auth-input-wrap">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor"
                                    stroke-width="2" />
                                <path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" />
                            </svg>
                            <input type="password" id="password" class="auth-input" placeholder="Tạo mật khẩu">
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-label">Xác nhận mật khẩu</label>
                        <div class="auth-input-wrap">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            </svg>
                            <input type="password" id="repassword" class="auth-input" placeholder="Nhập lại mật khẩu">
                        </div>
                    </div>


                    <button type="submit" class="btn-auth-primary">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M9 7a4 4 0 100 8 4 4 0 000-8zM22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Tạo tài khoản
                    </button>
                </form>

                <div class="auth-divider"><span>hoặc</span></div>

                <div class="auth-alt">
                    Đã có tài khoản?
                    <a href="login" class="auth-alt-link">Đăng nhập</a>
                </div>

                <a href="index" class="auth-back">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Quay lại trang chủ
                </a>
            </div>
        </div>

    </div>

</body>

</html>
