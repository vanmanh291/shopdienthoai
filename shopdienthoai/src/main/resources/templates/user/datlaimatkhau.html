<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Shopdienthoai</title>
    <link rel="shortcut icon" href="image/logo.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/user.js"></script>
    <script src="js/main.js"></script>
</head>
<body class="auth-body">

<div class="auth-page auth-page-centered">
    <div class="auth-form-wrap">

        <!-- Logo -->
        <a href="index" class="auth-centered-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="5" y="2" width="14" height="20" rx="3" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="17" r="1.5" fill="currentColor"/>
            </svg>
            shop<strong>dienthoai</strong>
        </a>

        <!-- Card -->
        <div class="auth-card auth-card-sm">

            <div class="auth-icon-block">
                <div class="auth-icon-circle auth-icon-circle-green">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                        <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
                        <path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
                    </svg>
                </div>
            </div>

            <div class="auth-card-header" style="text-align:center;">
                <h1 class="auth-title">Đặt lại mật khẩu</h1>
                <p class="auth-subtitle">Tạo mật khẩu mới cho tài khoản của bạn.</p>
            </div>

            <form action="javascript:datLaiMatKhau()" autocomplete="off" class="auth-form">
                <div class="auth-field">
                    <label class="auth-label">Mật khẩu mới</label>
                    <div class="auth-input-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input required type="password" id="password" class="auth-input" placeholder="Nhập mật khẩu mới">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-label">Xác nhận mật khẩu mới</label>
                    <div class="auth-input-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input required type="password" id="repassword" class="auth-input" placeholder="Nhập lại mật khẩu mới">
                    </div>
                </div>

                <div class="auth-tips">
                    <span class="auth-tip">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#10b981" stroke-width="2"/></svg>
                        Tối thiểu 8 ký tự
                    </span>
                    <span class="auth-tip">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#10b981" stroke-width="2"/></svg>
                        Kết hợp chữ hoa, chữ thường và số
                    </span>
                </div>

                <button type="submit" class="btn-auth-primary btn-auth-green">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Xác nhận đặt lại mật khẩu
                </button>
            </form>

            <div class="auth-divider"><span>hoặc</span></div>

            <div class="auth-alt">
                <a href="login" class="auth-alt-link">← Quay lại đăng nhập</a>
            </div>

        </div>

    </div>
</div>

</body>
</html>
